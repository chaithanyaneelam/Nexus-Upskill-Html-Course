<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="StudBridge - Learn MySQL from beginner to pro level with interactive examples."
    />
    <title>StudBridge | MySQL Learning Hub</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="mysql.css" />
  </head>
  <body>
    <header class="mobile-header">
      <h1 class="brand mobile-brand">StudBridge</h1>
      <button id="menu-btn" class="menu-btn" aria-label="Open Menu">
        <svg
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          width="28"
          height="28"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          ></path>
        </svg>
      </button>
    </header>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1 class="brand">StudBridge</h1>
        <button id="close-btn" class="close-btn" aria-label="Close Menu">
          <svg
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
            width="28"
            height="28"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            ></path>
          </svg>
        </button>
      </div>

      <nav class="sidebar-nav">
        <section class="nav-group">
          <h2 class="group-title">GETTING STARTED</h2>
          <button class="nav-item active" data-topic="intro">
            What is MySQL?
          </button>
          <button class="nav-item" data-topic="tables">
            Databases & Tables
          </button>
          <button class="nav-item" data-topic="insert">Inserting Data</button>
        </section>

        <section class="nav-group">
          <h2 class="group-title">BASIC QUERIES</h2>
          <button class="nav-item" data-topic="select">SELECT & FROM</button>
          <button class="nav-item" data-topic="where">Filtering (WHERE)</button>
        </section>

        <section class="nav-group">
          <h2 class="group-title">SORTING & LIMITS</h2>
          <button class="nav-item" data-topic="order">ORDER BY</button>
          <button class="nav-item" data-topic="limit">LIMIT & OFFSET</button>
        </section>

        <section class="nav-group">
          <h2 class="group-title">RELATIONS & COMBINING</h2>
          <button class="nav-item" data-topic="joins">INNER & LEFT JOIN</button>
        </section>

        <section class="nav-group">
          <h2 class="group-title">AGGREGATION</h2>
          <button class="nav-item" data-topic="group">GROUP BY</button>
          <button class="nav-item" data-topic="having">HAVING Clause</button>
        </section>
      </nav>
    </aside>

    <main class="content-area">
      <div id="lesson" class="lesson"></div>
    </main>

    <script src="mysql.js"></script>
  </body>
</html>
